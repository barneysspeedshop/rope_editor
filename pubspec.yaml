name: rope_editor
description: A lightweight rope-based text editor for Flutter using a Rust backend.
version: 0.0.1
license: GPL-3.0-or-later
homepage: https://github.com/barneysspeedshop/rope_editor
repository: https://github.com/barneysspeedshop/rope_editor
issue_tracker: https://github.com/barneysspeedshop/rope_editor/issues
topics:
  - editor
  - text-editor
  - rope
  - ffi
  - syntax-highlighting

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  ffi: ^2.1.2
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  legacy_context_menu: ^2.2.0
  legacy_keyboard_shortcut_decoration: ^1.1.0
  re_highlight: ^0.0.3

dev_dependencies:
  ffigen: ^11.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
